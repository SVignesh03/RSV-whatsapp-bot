name: Whatsapp Bot Cron Job
on:
  schedule:
    - cron: "0 1 */4 * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
      - name: Install Dependencies
        run: npm install
      - name: Run Cron Job
        run: node index.js
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          SESSION_DATA: ${{ secrets.SESSION_DATA }}
